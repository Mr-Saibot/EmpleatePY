<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EmpleatePY | Iniciar sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>


<body>


    <header class="encabezado">

        <div class="contenedor">

            <a href="index.html" class="logo">
                Empleate<span>PY</span>
            </a>


            <nav class="menu">

                <a href="index.html">
                    Inicio
                </a>


                <a href="proveedores.html">
                    Proveedores
                </a>


                <p id="saludo-usuario"></p>

                <a
                    href="login.html"
                    id="enlace-login">

                    Iniciar sesión

                </a>

            </nav>

        </div>

    </header>



    <main>


        <section class="login">

            <div class="contenedor">


                <div class="formulario-login">


                    <h1>
                        Iniciar sesión
                    </h1>


                    <p>
                        Accede a tu cuenta para disfrutar
                        de una mejor experiencia.
                    </p>



                    <form id="formulario-login">


                        <label for="usuario">
                            Usuario
                        </label>


                        <input 
                            type="text"
                            id="usuario"
                            placeholder="Ingrese su usuario"
                            required>



                        <label for="contrasena">
                            Contraseña
                        </label>


                        <input 
                            type="password"
                            id="contrasena"
                            placeholder="Ingrese su contraseña"
                            required>



                        <button 
                            type="submit"
                            class="boton-principal">

                            Iniciar sesión

                        </button>


                    </form>



                    <p id="mensaje-login">

                    </p>


                </div>


            </div>


        </section>


    </main>
    <br>
    <br>
    <br>
    <br>
    <br>
    



    <footer class="pie-pagina">


        <div class="contenedor">


            <h3>
                Empleate<span>PY</span>
            </h3>


            <p>
                Plataforma para encontrar proveedores
                de servicios locales.
            </p>


        </div>


    </footer>



    <script src="js/login.js"></script>
    <script src="js/sesion.js"></script>


</body>

</html>
